<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Background Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    cursor: crosshair;
  }

  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

  /* Demo content overlay */
  #demo-content {
    position: fixed;
    z-index: 5;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: rgba(200, 210, 255, 0.7);
    pointer-events: none;
    user-select: none;
  }
  #demo-content h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(220, 225, 255, 0.85);
    text-shadow: 0 0 40px rgba(100, 120, 255, 0.3);
    margin-bottom: 12px;
  }
  #demo-content p {
    font-size: 15px;
    letter-spacing: 2px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<canvas id="universe"></canvas>

<div id="demo-content">
  <h1>Universe Background</h1>
  <p>Move your mouse to connect the stars</p>
</div>

<script>
(() => {
  const canvas = document.getElementById('universe');
  const ctx = canvas.getContext('2d');

  let W, H;
  const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
  resize();
  addEventListener('resize', resize);

  // --- Stars ---
  const STAR_COUNT = 600;
  const stars = [];

  class Star {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.z = Math.random();
      this.baseRadius = 0.4 + Math.random() * 1.8;
      this.radius = this.baseRadius * (0.5 + this.z * 0.5);
      this.twinkleSpeed = 0.5 + Math.random() * 2;
      this.twinkleOffset = Math.random() * Math.PI * 2;
      const tints = [[255,255,255],[200,220,255],[255,240,200],[255,200,180],[180,200,255]];
      this.tint = tints[Math.floor(Math.random() * tints.length)];
      this.vx = (Math.random() - 0.5) * 0.08;
      this.vy = (Math.random() - 0.5) * 0.04;
    }
    update(t) {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < -10) this.x = W + 10;
      if (this.x > W + 10) this.x = -10;
      if (this.y < -10) this.y = H + 10;
      if (this.y > H + 10) this.y = -10;
      this.brightness = 0.4 + 0.6 * ((Math.sin(t * this.twinkleSpeed + this.twinkleOffset) + 1) / 2);
    }
    draw() {
      const r = this.radius;
      const b = this.brightness;
      const [cr, cg, cb] = this.tint;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
      grad.addColorStop(0, `rgba(${cr},${cg},${cb},${b * 0.7})`);
      grad.addColorStop(0.3, `rgba(${cr},${cg},${cb},${b * 0.15})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${b})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (let i = 0; i < STAR_COUNT; i++) stars.push(new Star());

  // --- Distant galaxies (pre-rendered to offscreen canvases) ---
  const GALAXY_DEFS = [
    // Spiral galaxy — warm golden arms
    { size: 120, tilt: 0.28, rotation: 0.4, arms: 2, armTightness: 0.3,
      coreColor: [255, 230, 180], armColor: [200, 160, 120], dustColor: [120, 80, 50],
      coreGlow: [255, 200, 140], opacity: 0.35 },
    // Spiral galaxy — cool blue
    { size: 90, tilt: 0.4, rotation: -0.7, arms: 3, armTightness: 0.25,
      coreColor: [180, 200, 255], armColor: [100, 140, 220], dustColor: [50, 70, 140],
      coreGlow: [140, 170, 255], opacity: 0.25 },
    // Elliptical galaxy — soft red/pink
    { size: 60, tilt: 0.5, rotation: 0, arms: 0, armTightness: 0,
      coreColor: [255, 180, 160], armColor: [200, 120, 100], dustColor: [140, 60, 60],
      coreGlow: [255, 150, 130], opacity: 0.2 },
    // Tiny edge-on spiral
    { size: 50, tilt: 0.85, rotation: 1.2, arms: 2, armTightness: 0.35,
      coreColor: [220, 210, 200], armColor: [160, 150, 140], dustColor: [100, 80, 70],
      coreGlow: [240, 230, 210], opacity: 0.18 },
    // Large faint spiral — violet
    { size: 140, tilt: 0.2, rotation: 2.0, arms: 2, armTightness: 0.2,
      coreColor: [200, 170, 240], armColor: [140, 110, 200], dustColor: [80, 50, 140],
      coreGlow: [180, 150, 255], opacity: 0.15 },
  ];

  function renderGalaxyTexture(def) {
    const s = def.size * 2;
    const offscreen = document.createElement('canvas');
    offscreen.width = s;
    offscreen.height = s;
    const oc = offscreen.getContext('2d');
    const cx = s / 2, cy = s / 2;

    // Core glow — multiple layers for depth
    for (let layer = 0; layer < 3; layer++) {
      const r = def.size * (0.08 + layer * 0.12);
      const alpha = (0.6 - layer * 0.15);
      const g = oc.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, `rgba(${def.coreGlow[0]},${def.coreGlow[1]},${def.coreGlow[2]},${alpha})`);
      g.addColorStop(0.4, `rgba(${def.coreColor[0]},${def.coreColor[1]},${def.coreColor[2]},${alpha * 0.4})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      oc.fillStyle = g;
      oc.beginPath();
      oc.arc(cx, cy, r, 0, Math.PI * 2);
      oc.fill();
    }

    // Spiral arms (particle-based for natural look)
    if (def.arms > 0) {
      const particleCount = 3000;
      for (let i = 0; i < particleCount; i++) {
        const armIndex = i % def.arms;
        const armOffset = (armIndex / def.arms) * Math.PI * 2;
        const dist = Math.random() * def.size * 0.9;
        const angle = armOffset + dist * def.armTightness + (Math.random() - 0.5) * 0.5;
        // spread increases with distance
        const spread = (Math.random() - 0.5) * (4 + dist * 0.12);
        const px = cx + Math.cos(angle) * dist + Math.cos(angle + Math.PI / 2) * spread;
        const py = cy + Math.sin(angle) * dist + Math.sin(angle + Math.PI / 2) * spread;

        const distRatio = dist / def.size;
        const alpha = (1 - distRatio) * 0.15 * (0.3 + Math.random() * 0.7);
        const size = 0.5 + Math.random() * 1.5;

        // Mix arm and dust colors based on distance
        const isNewStar = Math.random() > 0.6;
        const c = isNewStar ? def.armColor : def.dustColor;
        oc.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
        oc.beginPath();
        oc.arc(px, py, size, 0, Math.PI * 2);
        oc.fill();
      }

      // Bright knots in the arms (star-forming regions)
      for (let i = 0; i < 40; i++) {
        const armIndex = i % def.arms;
        const armOffset = (armIndex / def.arms) * Math.PI * 2;
        const dist = 15 + Math.random() * def.size * 0.7;
        const angle = armOffset + dist * def.armTightness;
        const px = cx + Math.cos(angle) * dist;
        const py = cy + Math.sin(angle) * dist;
        const r = 2 + Math.random() * 4;
        const g = oc.createRadialGradient(px, py, 0, px, py, r);
        g.addColorStop(0, `rgba(${def.armColor[0]},${def.armColor[1]},${def.armColor[2]},0.2)`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        oc.fillStyle = g;
        oc.beginPath();
        oc.arc(px, py, r, 0, Math.PI * 2);
        oc.fill();
      }
    } else {
      // Elliptical galaxy — smooth particle cloud
      for (let i = 0; i < 2000; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * def.size * 0.8;
        const px = cx + Math.cos(angle) * dist * (0.6 + Math.random() * 0.4);
        const py = cy + Math.sin(angle) * dist * (0.4 + Math.random() * 0.3);
        const alpha = (1 - dist / def.size) * 0.08;
        oc.fillStyle = `rgba(${def.coreColor[0]},${def.coreColor[1]},${def.coreColor[2]},${alpha})`;
        oc.beginPath();
        oc.arc(px, py, 0.5 + Math.random(), 0, Math.PI * 2);
        oc.fill();
      }
    }

    // Outer halo
    const halo = oc.createRadialGradient(cx, cy, def.size * 0.3, cx, cy, def.size);
    halo.addColorStop(0, `rgba(${def.coreGlow[0]},${def.coreGlow[1]},${def.coreGlow[2]},0.03)`);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    oc.fillStyle = halo;
    oc.beginPath();
    oc.arc(cx, cy, def.size, 0, Math.PI * 2);
    oc.fill();

    return offscreen;
  }

  // Place galaxies and pre-render their textures
  const galaxies = GALAXY_DEFS.map(def => {
    const texture = renderGalaxyTexture(def);
    return {
      ...def,
      texture,
      x: 80 + Math.random() * (W - 160),
      y: 80 + Math.random() * (H - 160),
      rotationSpeed: (Math.random() - 0.5) * 0.015,
      currentRotation: def.rotation,
    };
  });

  function drawGalaxies(t) {
    for (const g of galaxies) {
      g.currentRotation += g.rotationSpeed;
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(g.currentRotation);
      ctx.scale(1, 1 - g.tilt * 0.7); // tilt by squashing vertically
      ctx.globalAlpha = g.opacity;
      ctx.drawImage(g.texture, -g.size, -g.size);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // --- Nebula clouds ---
  function drawNebulae() {
    const nebulae = [
      { x: W * 0.2, y: H * 0.3, r: 250, color: [60, 30, 100] },
      { x: W * 0.75, y: H * 0.7, r: 300, color: [30, 50, 100] },
      { x: W * 0.5, y: H * 0.15, r: 200, color: [80, 30, 60] },
    ];
    nebulae.forEach(n => {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},0.08)`);
      g.addColorStop(0.5, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},0.03)`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // --- Mouse interaction ---
  const mouse = { x: -1000, y: -1000, active: false };
  const CONNECT_RADIUS = 160;
  const MAX_CONNECTIONS = 8;

  addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });
  addEventListener('mouseleave', () => { mouse.active = false; });
  addEventListener('touchmove', e => {
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
    mouse.active = true;
  });
  addEventListener('touchend', () => { mouse.active = false; });

  function drawConnections() {
    if (!mouse.active) return;

    const nearby = [];
    for (const s of stars) {
      const dx = s.x - mouse.x;
      const dy = s.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONNECT_RADIUS) {
        nearby.push({ star: s, dist });
      }
    }
    nearby.sort((a, b) => a.dist - b.dist);
    const connected = nearby.slice(0, MAX_CONNECTIONS);

    // Lines from cursor to stars
    for (const { star, dist } of connected) {
      const alpha = (1 - dist / CONNECT_RADIUS) * 0.6;
      ctx.strokeStyle = `rgba(120, 160, 255, ${alpha})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(mouse.x, mouse.y);
      ctx.lineTo(star.x, star.y);
      ctx.stroke();
      const grad = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.radius * 6);
      grad.addColorStop(0, `rgba(150, 180, 255, ${alpha * 0.5})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius * 6, 0, Math.PI * 2);
      ctx.fill();
    }

    // Inter-star constellation lines
    if (connected.length >= 2) {
      for (let i = 0; i < connected.length - 1; i++) {
        for (let j = i + 1; j < connected.length; j++) {
          const a = connected[i].star;
          const b = connected[j].star;
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < CONNECT_RADIUS * 1.2) {
            const alpha = (1 - d / (CONNECT_RADIUS * 1.2)) * 0.25;
            ctx.strokeStyle = `rgba(100, 140, 255, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
    }

    // Cursor glow
    const cg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, CONNECT_RADIUS);
    cg.addColorStop(0, 'rgba(100, 140, 255, 0.06)');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, CONNECT_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Shooting stars ---
  const shootingStars = [];
  function maybeSpawnShootingStar() {
    if (Math.random() < 0.003 && shootingStars.length < 2) {
      const angle = -Math.PI / 6 + Math.random() * -Math.PI / 4;
      shootingStars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.4,
        vx: Math.cos(angle) * (4 + Math.random() * 4),
        vy: -Math.sin(angle) * (4 + Math.random() * 4),
        life: 1,
        decay: 0.015 + Math.random() * 0.01,
        len: 40 + Math.random() * 60,
      });
    }
  }
  function updateShootingStars() {
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.x += s.vx;
      s.y += s.vy;
      s.life -= s.decay;
      if (s.life <= 0) { shootingStars.splice(i, 1); continue; }
      const alpha = s.life * 0.8;
      const speed = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
      const tailX = s.x - s.vx * (s.len / speed) * s.life;
      const tailY = s.y - s.vy * (s.len / speed) * s.life;
      const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
      grad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
      grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
    }
  }

  // --- Main loop ---
  function frame(ts) {
    const t = ts / 1000;
    ctx.clearRect(0, 0, W, H);

    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#05050f');
    bg.addColorStop(0.5, '#0a0a1a');
    bg.addColorStop(1, '#060612');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    drawNebulae();
    drawGalaxies(t);

    for (const s of stars) { s.update(t); s.draw(); }

    maybeSpawnShootingStar();
    updateShootingStars();
    drawConnections();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
